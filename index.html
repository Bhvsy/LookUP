<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00f0ff">
<title>Bhvsy OS - Lookup Tools</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyA2W2IcHrs0WasQuBk2h4nqui3z7_P6OmU",
  authDomain: "bhavishya-auth.firebaseapp.com",
  projectId: "bhavishya-auth",
  storageBucket: "bhavishya-auth.firebasestorage.app",
  messagingSenderId: "286150672573",
  appId: "1:286150672573:web:09bddc533e74c0c356f7d4",
  measurementId: "G-Q549BE9V0X"
};

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Hide the page content instantly
  document.documentElement.style.display = "none";

  onAuthStateChanged(auth, user => {
    if (!user) {
      window.location.replace("login.html"); // Kicks them to login
    } else {
      document.documentElement.style.display = "block"; // Shows your tool
    }
  });

  // Makes logout function available
  window.logout = () => signOut(auth).then(() => window.location.replace("login.html"));
</script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg-void:#030308;--accent-cyan:#00f0ff;--accent-purple:#8b5cf6;--accent-pink:#ec4899;--text-primary:#f0f4ff;--text-secondary:#94a3b8;--text-muted:#475569;--glass-bg:rgba(255,255,255,.025);--glass-border:rgba(255,255,255,.07);--radius:14px}
body{font-family:'Inter',sans-serif;background:var(--bg-void);color:var(--text-primary);overflow-x:hidden;line-height:1.6;min-height:100vh}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
.bg-orbs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.3}
.bg-orb-1{width:500px;height:500px;background:radial-gradient(circle,rgba(0,240,255,.22),transparent 70%);top:-8%;left:-4%;animation:o1 25s ease-in-out infinite}
.bg-orb-2{width:420px;height:420px;background:radial-gradient(circle,rgba(139,92,246,.25),transparent 70%);top:42%;right:-8%;animation:o2 30s ease-in-out infinite}
.bg-orb-3{width:380px;height:380px;background:radial-gradient(circle,rgba(236,72,153,.18),transparent 70%);bottom:-12%;left:28%;animation:o3 22s ease-in-out infinite}
@keyframes o1{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,90px)}}
@keyframes o2{0%,100%{transform:translate(0,0)}50%{transform:translate(-70px,50px)}}
@keyframes o3{0%,100%{transform:translate(0,0)}50%{transform:translate(50px,-50px)}}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);background-size:80px 80px}
.container{max-width:900px;margin:0 auto;padding:0 24px;position:relative;z-index:1}
.navbar{position:fixed;top:0;left:0;width:100%;z-index:100;padding:14px 0;background:rgba(3,3,8,.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.05)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;max-width:1100px;margin:0 auto;padding:0 24px}
.nav-brand{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:800;color:var(--accent-cyan);letter-spacing:3px;text-decoration:none}
.nav-credit{font-size:.78rem;color:var(--text-secondary);font-weight:500}
.nav-credit strong{color:var(--text-primary)}
.hero{padding:120px 24px 30px;text-align:center}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:7px 18px;border-radius:100px;background:rgba(0,240,255,.06);border:1px solid rgba(0,240,255,.15);color:var(--accent-cyan);font-size:.75rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:24px}
.hero-dot{width:7px;height:7px;background:#00ff88;border-radius:50%;animation:pulse 2s ease-in-out infinite;box-shadow:0 0 8px #00ff88}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.hero-title{font-family:'Space Grotesk',sans-serif;font-size:clamp(2.4rem,7vw,4.5rem);font-weight:800;line-height:1.05;letter-spacing:-2px;margin-bottom:14px;background:linear-gradient(135deg,#fff 0%,#fff 40%,var(--accent-cyan) 70%,var(--accent-purple) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-subtitle{font-size:1rem;color:var(--text-secondary);max-width:500px;margin:0 auto;line-height:1.7;font-weight:300}
.hero-subtitle strong{color:var(--accent-cyan);font-weight:600}
.tools-section{padding:30px 24px}
.tools-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:30px}
.tool-card{background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:var(--radius);padding:20px 14px;cursor:pointer;transition:all .35s cubic-bezier(.16,1,.3,1);text-align:center;user-select:none}
.tool-card:hover{background:rgba(255,255,255,.05);border-color:rgba(0,240,255,.25);transform:translateY(-3px)}
.tool-card.active{background:linear-gradient(135deg,rgba(0,240,255,.08),rgba(139,92,246,.08));border-color:rgba(0,240,255,.4);box-shadow:0 8px 30px rgba(0,240,255,.15)}
.tool-icon{font-size:1.8rem;margin-bottom:8px}
.tool-name{font-family:'Space Grotesk',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:-0.3px}
.lookup-card{background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:var(--radius);padding:30px 24px}
.lookup-title{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:700;margin-bottom:6px}
.lookup-desc{font-size:.88rem;color:var(--text-secondary);margin-bottom:20px}
.input-group{display:flex;gap:10px}
.input-field{flex:1;padding:14px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius);color:var(--text-primary);font-family:'Inter',sans-serif;font-size:.92rem;transition:all .3s ease;outline:none}
.input-field:hover,.input-field:focus{background:rgba(255,255,255,.08);border-color:rgba(0,240,255,.25)}
.input-field::placeholder{color:var(--text-muted)}
.btn-search{padding:14px 26px;background:linear-gradient(135deg,var(--accent-cyan),var(--accent-purple));border:none;border-radius:var(--radius);color:var(--bg-void);font-weight:700;font-size:.92rem;cursor:pointer;transition:all .3s ease;white-space:nowrap;letter-spacing:.5px;display:inline-flex;align-items:center;gap:8px}
.btn-search:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,240,255,.2)}
.btn-search:disabled{opacity:.6;cursor:not-allowed;transform:none}
.spinner{width:14px;height:14px;border-radius:50%;border:2px solid rgba(3,3,8,.6);border-top-color:transparent;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{background:rgba(255,0,110,.1);border:1px solid rgba(255,0,110,.25);color:#ff006e;padding:14px 16px;border-radius:var(--radius);font-size:.9rem;margin-top:16px}
.result-card{background:linear-gradient(135deg,rgba(0,240,255,.05),rgba(139,92,246,.05));border:1px solid rgba(0,240,255,.15);border-radius:var(--radius);padding:22px;margin-top:16px;animation:slideIn .4s cubic-bezier(.16,1,.3,1)}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.result-title{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700;color:var(--accent-cyan);margin-bottom:14px}
.result-row{display:flex;justify-content:space-between;gap:14px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.88rem}
.result-row:last-child{border-bottom:none}
.result-key{color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:.5px;font-size:.74rem;flex-shrink:0}
.result-value{color:var(--accent-cyan);font-family:'JetBrains Mono',monospace;font-weight:500;word-break:break-all;text-align:right}
.footer{border-top:1px solid rgba(255,255,255,.05);padding:30px 24px;text-align:center;margin-top:40px;position:relative;z-index:1}
.footer-text{font-size:.82rem;color:var(--text-secondary)}
.footer-text strong{color:var(--accent-cyan)}
@media (max-width:600px){.tools-grid{grid-template-columns:1fr;gap:10px}.input-group{flex-direction:column}.btn-search{width:100%;justify-content:center}.result-row{flex-direction:column;gap:4px}.result-value{text-align:left}.nav-credit{display:none}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg-void)}::-webkit-scrollbar-thumb{background:rgba(0,240,255,.2);border-radius:3px}
.btn-logout {
  background: rgba(255, 0, 110, 0.1);
  border: 1px solid rgba(255, 0, 110, 0.25);
  color: #ff006e;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  gap: 6px;
  letter-spacing: 0.5px;
}
.btn-logout:hover {
  background: rgba(255, 0, 110, 0.2);
  transform: translateY(-2px);
}
  
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
</div>
<div class="bg-grid"></div>

<nav class="navbar">
  <div class="nav-inner">
    <a href="#" class="nav-brand">BHVSY OS</a>
    
    <div style="display: flex; align-items: center; gap: 20px;">
      <span class="nav-credit">by <strong>Bhavishya Parjapati</strong></span>
      
      <button class="btn-logout" onclick="logout()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
    
  </div>
</nav>


<section class="hero">
  <div class="hero-badge"><span class="hero-dot"></span> LOOKUP PLATFORM</div>
  <h1 class="hero-title">BHVSY OS</h1>
  <p class="hero-subtitle">Pure Information Lookup Tools<br><strong>by Bhavishya Parjapati</strong></p>
</section>

<section class="tools-section">
  <div class="container">
    <div class="tools-grid">
      <div class="tool-card active" data-tool="phone" onclick="setTool('phone')">
        <div class="tool-icon">📱</div>
        <div class="tool-name">Phone</div>
      </div>
      <div class="tool-card" data-tool="aadhar" onclick="setTool('aadhar')">
        <div class="tool-icon">🆔</div>
        <div class="tool-name">Aadhar</div>
      </div>
      <div class="tool-card" data-tool="vehicle" onclick="setTool('vehicle')">
        <div class="tool-icon">🚗</div>
        <div class="tool-name">Vehicle</div>
      </div>
    </div>

    <div class="lookup-card">
      <h2 class="lookup-title" id="lbl">Phone Lookup</h2>
      <p class="lookup-desc" id="desc">Enter a 10-digit mobile number</p>
      <div class="input-group">
        <input id="q" class="input-field" type="number" placeholder="Enter 10-digit mobile number" onkeydown="if(event.key==='Enter')doSearch()"/>
        <button class="btn-search" id="btn" onclick="doSearch()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          Search
        </button>
      </div>
      <div id="error" class="error-msg" style="display:none"></div>
      <div id="result" class="result-card" style="display:none">
        <div class="result-title" id="result-label">Results</div>
        <div id="rows"></div>
      </div>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="container">
    <p class="footer-text">© <span id="yr"></span> <strong>Bhavishya Parjapati</strong> · BHVSY OS · All rights reserved.</p>
  </div>
</footer>

<script>
const TOOLS = {
  phone:   { label:'Phone Lookup',   desc:'Enter a 10-digit mobile number',         ph:'Enter 10-digit mobile number',      type:'number', param:'type=phone&num=' },
  aadhar:  { label:'Aadhar Lookup',  desc:'Enter a 12-digit Aadhar number',          ph:'Enter 12-digit Aadhar number',      type:'number', param:'type=aadhar&aadhar=' },
  vehicle: { label:'Vehicle Lookup', desc:'Enter a vehicle registration number',     ph:'Enter vehicle number (MH01AB1234)', type:'text',   param:'type=vehicle&vehicle=' },
};
const PROXIES = [
  url => 'https://corsproxy.io/?' + encodeURIComponent(url),
  url => 'https://api.allorigins.win/get?url=' + encodeURIComponent(url),
];
let current = 'phone';
document.getElementById('yr').textContent = new Date().getFullYear();

function setTool(t) {
  current = t;
  document.querySelectorAll('.tool-card').forEach(el => el.classList.toggle('active', el.dataset.tool === t));
  const m = TOOLS[t];
  document.getElementById('lbl').textContent = m.label;
  document.getElementById('desc').textContent = m.desc;
  const q = document.getElementById('q');
  q.placeholder = m.ph; q.type = m.type; q.value = '';
  q.style.textTransform = t === 'vehicle' ? 'uppercase' : 'none';
  document.getElementById('error').style.display = 'none';
  document.getElementById('result').style.display = 'none';
}
function flatten(obj, prefix) {
  const out = {};
  for (const [k, v] of Object.entries(obj || {})) {
    const key = prefix ? prefix + ' › ' + k : k;
    if (v !== null && typeof v === 'object' && !Array.isArray(v)) Object.assign(out, flatten(v, key));
    else if (Array.isArray(v)) v.forEach((item, i) => {
      if (item && typeof item === 'object') Object.assign(out, flatten(item, key + '[' + i + ']'));
      else out[key + '[' + i + ']'] = String(item);
    });
    else out[key] = String(v ?? '');
  }
  return out;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('result').style.display = 'none';
}
function showResult(data, query) {
  document.getElementById('error').style.display = 'none';
  document.getElementById('result-label').textContent = 'Results for: ' + query;
  const flat = flatten(data);
  const rows = document.getElementById('rows');
  rows.innerHTML = '';
  let count = 0;
  for (const [k, v] of Object.entries(flat)) {
    if (!v || v === 'null' || v === 'undefined') continue;
    const div = document.createElement('div');
    div.className = 'result-row';
    div.innerHTML = '<span class="result-key">' + esc(k) + '</span><span class="result-value">' + esc(v) + '</span>';
    rows.appendChild(div); count++;
  }
  if (count === 0) { showError('No results found for: ' + query); return; }
  document.getElementById('result').style.display = 'block';
}
async function tryFetch(targetUrl) {
  for (let i = 0; i < PROXIES.length; i++) {
    try {
      const res = await fetch(PROXIES[i](targetUrl));
      if (!res.ok) continue;
      const text = await res.text();
      try {
        const w = JSON.parse(text);
        return w.contents ? JSON.parse(w.contents) : w;
      } catch { return JSON.parse(text); }
    } catch (e) { if (i === PROXIES.length - 1) throw e; }
  }
}
async function doSearch() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Searching...';
  document.getElementById('error').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  const meta = TOOLS[current];
  const targetUrl = 'https://shiya.zya.me/api-proxy.php?' + meta.param + encodeURIComponent(q);
  try {
    const data = await tryFetch(targetUrl);
    const hasData = data.data || data.result || data.records || data.info || data.results;
    if (data.status === 'error' && !hasData) showError(data.message || data.error || 'No data found for: ' + q);
    else showResult(data, q);
  } catch (e) {
    showError('Could not reach server. Try again. (' + e.message + ')');
  }
  btn.disabled = false;
  btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg> Search';
}
</script>
</body>
</html>
